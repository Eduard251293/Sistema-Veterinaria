<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 text-success"><i class="fas fa-user-plus"></i> Registro de Nueva Admisión</h5>
                </div>
                <div class="card-body">
                    <form id="admissionForm">
                        <div class="row mb-4">
                            <div class="col-12">
                                <h6 class="text-muted border-bottom pb-2">Datos del Propietario</h6>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">DNI / Documento</label>
                                <input type="text" class="form-control" placeholder="Ej. 70654321" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control" placeholder="Nombre y Apellidos" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Teléfono / Celular</label>
                                <input type="tel" class="form-control" placeholder="987 654 321" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" placeholder="cliente@correo.com">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Dirección</label>
                                <input type="text" class="form-control" placeholder="Av. Las Mascotas 123">
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-12">
                                <h6 class="text-muted border-bottom pb-2">Datos del Paciente (Mascota)</h6>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Nombre de la Mascota</label>
                                <input type="text" class="form-control" placeholder="Ej. Firulais" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Especie</label>
                                <select class="form-select">
                                    <option selected disabled>Seleccionar...</option>
                                    <option>Canino</option>
                                    <option>Felino</option>
                                    <option>Ave</option>
                                    <option>Otro</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Raza</label>
                                <input type="text" class="form-control" placeholder="Ej. Labrador">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Género</label>
                                <select class="form-select">
                                    <option>Macho</option>
                                    <option>Hembra</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Fecha de Nacimiento (Aprox.)</label>
                                <input type="date" class="form-control">
                            </div>
                            <div class="col-md-8 mb-3">
                                <label class="form-label">Observaciones Iniciales</label>
                                <textarea class="form-control" rows="1" placeholder="Alergias, temperamento, etc."></textarea>
                            </div>
                        </div>

                        <div class="text-end">
                            <button type="reset" class="btn btn-outline-secondary me-2">Limpiar Campos</button>
                            <button type="submit" class="btn btn-success px-4">
                                <i class="fas fa-save"></i> Registrar Ingreso
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
