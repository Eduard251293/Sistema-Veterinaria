<div class="container-fluid">
    <div class="row g-4">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0"><i class="fas fa-calendar-plus me-2"></i>Nueva Cita Médica</h5>
                </div>
                <div class="card-body">
                    <form id="formAgendamiento">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Buscar Paciente</label>
                            <div class="input-group">
                                <input type="text" class="form-control" placeholder="Nombre o ID de mascota">
                                <button class="btn btn-outline-secondary" type="button"><i class="fas fa-search"></i></button>
                            </div>
                            <div class="form-text">El paciente debe estar registrado en Admisión.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Especialista / Veterinario</label>
                            <select class="form-select" required>
                                <option selected disabled>Seleccionar médico...</option>
                                <option>Dra. Ana Smith (Medicina General)</option>
                                <option>Dr. Carlos García (Cirugía)</option>
                                <option>Dra. Elena Ruiz (Vacunación)</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Fecha</label>
                                <input type="date" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Hora</label>
                                <input type="time" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Motivo de Consulta</label>
                            <textarea class="form-control" rows="2" placeholder="Ej: Control de rutina, malestar estomacal..."></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Confirmar Agendamiento</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-secondary"><i class="fas fa-clock me-2"></i>Citas Programadas (Hoy)</h5>
                    <span class="badge bg-info text-dark">20 de Abril, 2026</span>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Hora</th>
                                    <th>Paciente</th>
                                    <th>Médico</th>
                                    <th>Estado</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>09:00</td>
                                    <td><strong>Firulais</strong> <br><small class="text-muted">Juan Pérez</small></td>
                                    <td>Dra. Smith</td>
                                    <td><span class="badge rounded-pill bg-success">Confirmado</span></td>
                                    <td><button class="btn btn-sm btn-light"><i class="fas fa-ellipsis-v"></i></button></td>
                                </tr>
                                <tr>
                                    <td>10:30</td>
                                    <td><strong>Luna</strong> <br><small class="text-muted">María Sosa</small></td>
                                    <td>Dr. García</td>
                                    <td><span class="badge rounded-pill bg-warning text-dark">En Espera</span></td>
                                    <td><button class="btn btn-sm btn-light"><i class="fas fa-ellipsis-v"></i></button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
