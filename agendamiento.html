<div class="container-fluid">
    <div class="row g-4">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0"><i class="fas fa-calendar-plus me-2"></i>Programar Nueva Cita</h5>
                </div>
                <div class="card-body">
                    <form id="formAgendamientoCitas">
                        <div class="mb-3">
                            <label class="form-label fw-bold">ID de la Mascota (GUID)</label>
                            <input type="text" class="form-control" id="citaAnimalId" placeholder="Ej: 123e4567-e89b-12d3-a456-426614174000" required>
                            <div class="form-text">Ingrese el identificador único del paciente registrado en Admisión.</div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Fecha</label>
                                <input type="date" class="form-control" id="citaFecha" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Hora</label>
                                <input type="time" class="form-control" id="citaHora" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Estado Inicial</label>
                            <select class="form-select" id="citaEstadoId" required>
                                <option value="PROGRAMADA" selected>PROGRAMADA</option>
                                <option value="CONFIRMADA">CONFIRMADA</option>
                                <option value="CANCELADA">CANCELADA</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Motivo de la Cita</label>
                            <textarea class="form-control" id="citaMotivo" rows="2" placeholder="Ej: Consulta general, control de vacunas..." required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Observaciones</label>
                            <textarea class="form-control" id="citaObservaciones" rows="2" placeholder="Notas internas o indicaciones previas..."></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Confirmar Cita
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 text-secondary"><i class="fas fa-clock me-2"></i>Control de Citas</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Fecha / Hora</th>
                                    <th>ID Mascota</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><small>2026-04-01 10:00:00</small></td>
                                    <td><small class="text-muted">123e4567-e89b...</small></td>
                                    <td><span class="badge bg-primary">PROGRAMADA</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
