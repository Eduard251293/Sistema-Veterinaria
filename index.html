<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Veterinaria - Huellitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        .card-header {
            background-color: white;
            border-bottom: none;
            padding-top: 2rem;
        }
        .logo-icon {
            font-size: 3rem;
            color: #56ab2f;
        }
        .btn-login {
            background-color: #56ab2f;
            border: none;
            padding: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-login:hover {
            background-color: #458a25;
            transform: translateY(-2px);
        }
        .form-control:focus {
            border-color: #56ab2f;
            box-shadow: 0 0 0 0.25rem rgba(86, 171, 47, 0.25);
        }
    </style>
</head>
<body>

    <div class="container p-3">
        <div class="card login-card mx-auto">
            <div class="card-header text-center">
                <div class="logo-icon mb-2">
                    <i class="fas fa-paw"></i>
                </div>
                <h2 class="fw-bold m-0">Huellitas <span class="text-success">Vet</span></h2>
                <p class="text-muted">Gestión de Servicios Veterinarios</p>
            </div>
            
            <div class="card-body p-4">
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label text-secondary">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control bg-light border-start-0" id="email" placeholder="ejemplo@vet.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label text-secondary">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" class="form-control bg-light border-start-0" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="d-grid shadow-sm">
                        <button type="submit" class="btn btn-primary btn-login text-white">
                            Ingresar al Sistema
                        </button>
                    </div>
                </form>
            </div>

            <div class="card-footer bg-white text-center border-top-0 pb-4">
                <a href="#" class="text-decoration-none text-muted small">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
